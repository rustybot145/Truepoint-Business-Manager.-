<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TruePoint</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(0,200,150,0.09) 0%, transparent 65%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -150px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }
    .login-logo-text {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .login-logo-text span { color: var(--text); }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .login-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 28px;
    }
    .login-error {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.25);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 14px;
      pointer-events: none;
    }
    .input-icon-wrap .form-control {
      padding-left: 40px;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-3);
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="login-logo">
    <img src="{{ url_for('static', filename='img/hf_20260512_002223_55d776ae-4e4f-4033-81bf-b15e1e63c30a-removebg-preview.png') }}" alt="TruePoint">
    <div class="login-logo-text">True<span>Point</span></div>
  </div>

  <div class="login-card">
    <div class="login-heading">Welcome back</div>
    <div class="login-sub">Sign in to your business manager</div>

    {% if error %}
    <div class="login-error">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" autocomplete="username" autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary login-btn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
      </button>
    </form>
  </div>

  <div class="login-footer">TruePoint Business Manager &nbsp;·&nbsp; v1.0</div>
</div>
</body>
</html>
